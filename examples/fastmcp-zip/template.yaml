AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  lambda-fastmcp

  Sample SAM Template for lambda-fastmcp


Globals:
  Function:
    Timeout: 29
    LoggingConfig:
      LogFormat: JSON
      SystemLogLevel: WARN

Resources:
  MCPServerFunction:
    Type: AWS::Serverless::Function 
    Properties:
      CodeUri: my_mcp_server/
      Handler: run.sh
      Runtime: python3.14
      Architectures:
      - arm64
      MemorySize: 8000
      Tracing: Active
      EventInvokeConfig:
        MaximumRetryAttempts: 0
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          PORT: '8000'
          AWS_LWA_READINESS_CHECK_PATH: /healthz
          AWS_LWA_READINESS_CHECK_HEALTHY_STATUS: 100-499
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerArm64:26
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref McpHttpApi
            Path: /{proxy+}
            Method: ANY

  McpHttpApi:
    Type: AWS::Serverless::HttpApi

Outputs:
  MCPServerFunction:
    Description: MCP Server Lambda Function ARN
    Value: !GetAtt MCPServerFunction.Arn
  McpApiUrl:
    Description: MCP API endpoint URL
    Value: !Sub https://${McpHttpApi}.execute-api.${AWS::Region}.amazonaws.com/mcp
